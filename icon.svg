<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <!-- Глобальная группа с настройками контура для всего насоса -->
    <g stroke="#000000" stroke-width="18" stroke-linejoin="round" stroke-linecap="round">

        <!-- Нижняя опорная плита (База) -->
        <rect x="170" y="440" width="260" height="40" fill="#6ba4ff" rx="15" />

        <!-- Синий пьедестал под основным корпусом -->
        <rect x="230" y="380" width="140" height="60" fill="#6ba4ff" />

        <!-- Левый желтый коннектор (Входной/выходной патрубок) -->
        <rect x="15" y="210" width="40" height="80" fill="#ffff8c" rx="5" />

        <!-- Верхний желтый коннектор -->
        <rect x="70" y="95" width="50" height="30" fill="#ffff8c" rx="5" />

        <!-- Соединительный красный блок (Сложная фигура, спрятанная за передней панелью) -->
        <path d="M 100 160
              L 130 160
              L 130 90
              A 10 10 0 0 1 140 80
              L 180 80
              A 10 10 0 0 1 190 90
              L 190 380
              L 100 380 Z"
              fill="#f43f24" />

        <!-- Правая темно-красная заглушка мотора -->
        <path d="M 420 150
              L 450 150
              A 40 40 0 0 1 490 190
              L 490 340
              A 40 40 0 0 1 450 380
              L 420 380 Z"
              fill="#b22216" />

        <!-- Основной синий цилиндр (Корпус) -->
        <rect x="180" y="150" width="240" height="230" fill="#6ba4ff" rx="10" />

        <!-- Главная красная насосная камера слева -->
        <rect x="40" y="130" width="100" height="260" fill="#f43f24" rx="30" />

        <!-- Горизонтальные ребра охлаждения на синем корпусе -->
        <line x1="215" y1="190" x2="385" y2="190" />
        <line x1="215" y1="230" x2="385" y2="230" />
        <line x1="215" y1="270" x2="385" y2="270" />
        <line x1="215" y1="310" x2="385" y2="310" />
        <line x1="215" y1="350" x2="385" y2="350" />

    </g>
</svg>
